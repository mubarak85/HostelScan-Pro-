<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>HostelScan Pro v3.2 - Eksport Rekod Ponteng</title>
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  
  <style>
    @media print {
      body { background: white; color: black; padding: 0; }
      #elemen-cetak-padam, .lg\:col-span-5, #kad-tarikh, #kad-analisa, #kad-ringkasan, .butang-aksi { display: none !important; }
      .lg\:col-span-7 { width: 100% !important; }
      #kad-belum-masuk { border: none !important; box-shadow: none !important; }
      .tabel-cetak { border: 1px solid #000 !important; }
    }
    #reader video { object-fit: cover !important; width: 100% !important; height: 100% !important; }
  </style>
</head>
<body class="bg-slate-100 font-sans min-h-screen p-4 lg:p-6">

  <div class="max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-6 items-start">
    
    <!-- PANEL KIRI: SCANNER -->
    <div class="lg:col-span-5 bg-white rounded-2xl shadow-xl overflow-hidden w-full">
      <div class="bg-blue-600 p-5 text-white text-center relative">
        <h1 class="text-xl font-bold tracking-wide">HOSTELSCAN PRO v3.2</h1>
        <p class="text-xs text-blue-200 mt-1">Terminal Imbasan & Log Pergerakan</p>
        <button id="btn-tukar-kamera" onclick="tukarKamera()" class="hidden absolute right-4 top-1/2 -translate-y-1/2 bg-white/20 hover:bg-white/30 text-white p-2 rounded-full transition-all text-xs border border-white/30">🔄</button>
      </div>

      <div id="elemen-cetak-padam" class="p-4 bg-slate-50 border-b border-slate-200 flex gap-2">
        <button id="tab-masuk" onclick="setModPergerakan('MASUK')" class="w-full py-2.5 rounded-xl font-bold text-sm transition-all bg-emerald-600 text-white shadow-md">📥 MASUK</button>
        <button id="tab-keluar" onclick="setModPergerakan('KELUAR')" class="w-full py-2.5 rounded-xl font-bold text-sm transition-all bg-white text-slate-600 border border-slate-200">📤 KELUAR</button>
      </div>

      <div class="p-5 space-y-4">
        <div id="bingkai-kamera" class="relative w-full rounded-xl overflow-hidden bg-black min-h-[280px] border-2 border-emerald-500 flex items-center justify-center">
          <div id="reader" class="w-full h-full"></div>
          <div id="overlay-mula" class="absolute inset-0 bg-slate-900 flex flex-col items-center justify-center p-6 text-center z-50">
            <button onclick="mulaKameraGitHub()" class="bg-emerald-600 text-white font-bold py-3 px-6 rounded-xl">📷 Aktifkan Kamera</button>
          </div>
        </div>
      </div>

      <div class="p-5 border-t bg-slate-50/50 min-h-[100px]">
        <div id="notifikasi-badge" class="hidden text-center py-2 px-4 rounded-full font-bold text-sm mb-3"></div>
        <div id="kotak-maklumat" class="hidden space-y-2 bg-white p-4 rounded-xl border border-slate-200 shadow-sm">
          <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Nama</span><span class="col-span-2 font-bold" id="data-nama">-</span></div>
          <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Dorm</span><span class="col-span-2 font-bold text-blue-600" id="data-dorm">-</span></div>
          <div class="grid grid-cols-3 text-sm"><span class="text-gray-400">Status</span><span class="col-span-2"><span id="data-status" class="text-xs px-2 py-0.5 rounded font-black uppercase">-</span></span></div>
        </div>
      </div>
    </div>

    <!-- PANEL KANAN: ANALISA -->
    <div class="lg:col-span-7 space-y-6 w-full">
      <div id="kad-tarikh" class="bg-white p-4 rounded-2xl shadow-xl border border-slate-100 flex items-center justify-between">
        <h3 class="font-bold text-sm text-slate-800">📅 Tarikh Rujukan Warden</h3>
        <input type="date" id="pilih-tarikh" onchange="muatNaikStatistik()" class="border rounded-xl px-3 py-1.5 text-sm font-semibold bg-slate-50">
      </div>
      
      <!-- ANALISA KESELURUHAN DENGAN TAMBAHAN LIVE KELUAR -->
      <div id="kad-analisa" class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
        <h2 class="font-bold text-slate-800 text-base border-b pb-3 mb-4">📊 Analisa Keseluruhan</h2>
        <div class="grid grid-cols-4 gap-2 text-center">
          <div class="bg-slate-50 p-3 rounded-xl border"><p class="text-[10px] text-slate-500 uppercase">Jumlah</p><p id="stat-total" class="text-xl font-black">0</p></div>
          <div class="bg-emerald-50 p-3 rounded-xl border border-emerald-100"><p class="text-[10px] text-emerald-600 uppercase">Masuk</p><p id="stat-masuk" class="text-xl font-black text-emerald-700">0</p></div>
          <div class="bg-red-50 p-3 rounded-xl border border-red-100"><p class="text-[10px] text-red-600 uppercase">Keluar</p><p id="stat-keluar" class="text-xl font-black text-red-700">0</p></div>
          <div class="bg-rose-50 p-3 rounded-xl border border-rose-200 animate-pulse"><p class="text-[10px] text-rose-600 uppercase">Live Keluar</p><p id="stat-keluar-live" class="text-xl font-black text-rose-700">0</p></div>
        </div>
      </div>

      <div id="kad-ringkasan" class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
        <h2 class="font-bold text-slate-800 text-base border-b pb-3 mb-4">🏫 Ringkasan Tingkatan</h2>
        <table class="w-full text-left"><tbody id="jadual-tingkatan"></tbody></table>
      </div>

      <div id="kad-belum-masuk" class="bg-white p-6 rounded-2xl shadow-xl border border-slate-100">
        <div class="flex justify-between items-center mb-4">
          <h2 class="font-bold text-red-600">⚠️ Belum Masuk</h2>
          <div class="flex gap-2"><button onclick="eksportKeExcel()" class="bg-emerald-600 text-white text-xs px-3 py-1.5 rounded-lg">💾 Excel</button></div>
        </div>
        <table class="w-full text-left"><tbody id="jadual-belum-masuk"></tbody></table>
      </div>
    </div>
  </div>

  <script>
    let html5QrCode, sedangMemproses = false, statusSemasaArah = "MASUK", dataGlobalBelumMasuk = [];
    const urlAPI = "https://script.google.com/macros/s/AKfycbz473UUN247YnjxN4yQOT6fDvhgYeOPY9KEx0wrqHInB_odjewM315iA8dWRDneunHVMA/exec";

    window.onload = function() {
      const hariIni = new Date().toISOString().split('T')[0];
      document.getElementById('pilih-tarikh').value = hariIni;
      muatNaikStatistik();
      setInterval(muatNaikStatistik, 15000); // Auto-refresh setiap 15 saat
    };

    function setModPergerakan(arah) {
      statusSemasaArah = arah;
      document.getElementById("tab-masuk").className = (arah === "MASUK") ? "w-full py-2.5 rounded-xl font-bold text-sm bg-emerald-600 text-white shadow-md" : "w-full py-2.5 rounded-xl font-bold text-sm bg-white text-slate-600 border";
      document.getElementById("tab-keluar").className = (arah === "KELUAR") ? "w-full py-2.5 rounded-xl font-bold text-sm bg-red-600 text-white shadow-md" : "w-full py-2.5 rounded-xl font-bold text-sm bg-white text-slate-600 border";
    }

    function muatNaikStatistik() {
      const tarikhPilihan = document.getElementById("pilih-tarikh").value;
      fetch(urlAPI + "?tarikh=" + tarikhPilihan)
      .then(res => res.json())
      .then(data => {
        if(data.status === "SUCCESS") {
          document.getElementById("stat-total").innerText = data.keseluruhan.total;
          document.getElementById("stat-masuk").innerText = data.keseluruhan.masuk;
          document.getElementById("stat-keluar").innerText = data.keseluruhan.keluar;
          document.getElementById("stat-keluar-live").innerText = data.keseluruhan.keluar;
          // ... fungsi render jadual sedia ada ...
        }
      });
    }

    // ... (fungsi-fungsi lain kekal sama seperti kod asal anda) ...
    function mulaKameraGitHub() { document.getElementById('overlay-mula').style.display = 'none'; html5QrCode = new Html5Qrcode("reader", false); jalankanKamera("environment"); }
    function jalankanKamera(mode) { html5QrCode.start({ facingMode: mode }, { fps: 10, qrbox: 250 }, (txt) => { if(!sedangMemproses) prosesPenghantaranData(txt); }); }
    function prosesPenghantaranData(id) { /* ... kod proses asal ... */ }
  </script>
</body>
</html>
