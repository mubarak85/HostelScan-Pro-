<!DOCTYPE html>
<html lang="ms">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem Imbasan Kehadiran Asrama</title>
    <!-- Membawa masuk perpustakaan QR Scanner html5-qrcode -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin: 0; padding: 0; }
        body { background-color: #f4f6f9; color: #333; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .container { width: 100%; max-width: 500px; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); margin-top: 10px; }
        h2 { text-align: center; color: #1a365d; margin-bottom: 15px; font-size: 1.4rem; }
        
        /* Pilihan Mod Status */
        .status-selector { display: flex; gap: 10px; margin-bottom: 20px; }
        .btn-status { flex: 1; padding: 12px; border: 2px solid #cbd5e1; border-radius: 8px; font-weight: bold; cursor: pointer; background: white; transition: all 0.2s; font-size: 1rem; }
        .btn-status.active-masuk { background-color: #10b981; color: white; border-color: #10b981; }
        .btn-status.active-keluar { background-color: #ef4444; color: white; border-color: #ef4444; }
        
        /* Kotak Scanner & Input Manual */
        #reader { width: 100%; border-radius: 8px; overflow: hidden; border: none; background: #e2e8f0; }
        .manual-section { margin-top: 20px; border-top: 2px dashed #e2e8f0; padding-top: 15px; }
        label { display: block; font-weight: 600; margin-bottom: 5px; color: #475569; font-size: 0.9rem; }
        .input-group { display: flex; gap: 8px; }
        input[type="text"] { flex: 1; padding: 12px; border: 1px solid #cbd5e1; border-radius: 8px; font-size: 1rem; outline: none; }
        input[type="text"]:focus { border-color: #3b82f6; }
        .btn-submit { padding: 0 20px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1rem; }
        .btn-submit:hover { background: #2563eb; }
        
        /* Paparan Keputusan Result */
        #result-box { margin-top: 20px; padding: 15px; border-radius: 8px; display: none; text-align: center; font-weight: 500; animation: fadeIn 0.3s ease-in-out; }
        .success-box { background-color: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .error-box { background-color: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
        .loading-box { background-color: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="container">
        <h2>REKOD KEHADIRAN ASRAMA</h2>
        
        <!-- Pilihan Mod Status -->
        <div class="status-selector">
            <button class="btn-status active-masuk" id="btn-masuk" onclick="tukarStatus('MASUK')">👉 MASUK</button>
            <button class="btn-status" id="btn-keluar" onclick="tukarStatus('KELUAR')">👈 KELUAR</button>
        </div>

        <!-- Kawasan Kamera QR Kod -->
        <div id="reader"></div>

        <!-- Kawasan Input Taip Manual -->
        <div class="manual-section">
            <label for="manual-id">Jika QR rosak, taip ID Pelajar di bawah:</label>
            <div class="input-group">
                <input type="text" id="manual-id" placeholder="Contoh: P00123" autocomplete="off">
                <button class="btn-submit" onclick="hantarManual()">Hantar</button>
            </div>
        </div>

        <!-- Kotak Keputusan Log Respon -->
        <div id="result-box"></div>
    </div>

    <script>
        // ==========================================
        // ⚠️ SILA GANTIKAN URL DI BAWAH DENGAN URL WEB APP GAS ANDA
        // ==========================================
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbwRqUL3LbdYOzAbA_3yQfK6sqBZYVgBKOD3GXb1Eauhxno8jxaU_Oo5hQjEIWuqPcTZOw/exec"; 

        let modSemasa = "MASUK";
        letisScanning = true;

        function tukarStatus(status) {
            modSemasa = status;
            const btnMasuk = document.getElementById('btn-masuk');
            const btnKeluar = document.getElementById('btn-keluar');
            
            if(status === 'MASUK') {
                btnMasuk.className = 'btn-status active-masuk';
                btnKeluar.className = 'btn-status';
            } else {
                btnMasuk.className = 'btn-status';
                btnKeluar.className = 'btn-status active-keluar';
            }
        }

        // Papar mesej status maklum balas kepada pengguna
        function paparMesej(teks, jenis) {
            const box = document.getElementById('result-box');
            box.style.display = 'block';
            box.className = ''; // Reset class
            
            if(jenis === 'success') box.classList.add('result-box', 'success-box');
            if(jenis === 'error') box.classList.add('result-box', 'error-box');
            if(jenis === 'loading') box.classList.add('result-box', 'loading-box');
            
            box.innerHTML = teks;
        }

        // Proses utama menghantar data ID ke Google Sheets via Apps Script
        function prosesImbasan(idPelajar Raw) {
            if (!idPelajarRaw) return;
            const idPelajar = idPelajarRaw.trim();
            
            paparMesej("Sila tunggu... Memproses ID " + idPelajar, "loading");
            
            fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // Mengelakkan isu sekatan CORS pelayar web
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ idPelajar: idPelajar, status: modSemasa })
            })
            .then(() => {
                // Disebabkan 'no-cors', kita tidak boleh baca json respon secara langsung,
                // Namun data dijamin selamat sampai ke Sheets jika URL Web App anda betul.
                paparMesej("<b>✓ Selesai diproses!</b><br>ID: " + idPelajar + "<br>Status: " + modSemasa + "<br><small>Sila semak tab Kehadiran jika peranti bersambung internet.</small>", "success");
                document.getElementById('manual-id').value = ""; // Kosongkan ruangan input manual
                
                // Beri ruang jeda 3 saat sebelum membolehkan imbasan seterusnya
                setTimeout(() => { isScanning = true; }, 3000);
            })
            .catch(error => {
                paparMesej("❌ RALAT HUBUNGAN DATABASE<br><small>Pastikan Apps Script telah di-deploy dengan betul sebagai 'Anyone'.</small>", "error");
                setTimeout(() => { isScanning = true; }, 3000);
            });
        }

        // Fungsi pemicu butang hantar input manual
        function hantarManual() {
            const inputVal = document.getElementById('manual-id').value;
            if(!inputVal) {
                paparMesej("❌ Sila masukkan ID Pelajar terlebih dahulu!", "error");
                return;
            }
            isScanning = false;
            prosesImbasan(inputVal);
        }

        // Konfigurasi Kamera Menggunakan html5-qrcode
        function onScanSuccess(decodedText, decodedResult) {
            if (isScanning) {
                isScanning = false; // Hentikan seketika untuk elak imbasan berlapis
                prosesImbasan(decodedText);
            }
        }

        function onScanFailure(error) {
            // Kegagalan imbasan kecil (frame kabur dll) diabaikan secara senyap untuk kelancaran video live feed
        }

        // Memulakan scanner secara automatik menggunakan kamera belakang telefon
        let html5QrcodeScanner = new Html5QrcodeScanner("reader", { fps: 10, qrbox: {width: 250, height: 250} }, false);
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    </script>
</body>
</html>
