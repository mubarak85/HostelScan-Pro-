<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelScan Pro - Stabil</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 p-4">
  <div class="max-w-md mx-auto">
    <h1 class="text-xl font-black text-center mb-4">HOSTELSCAN PRO</h1>
    <div id="reader" class="w-full h-64 bg-black rounded-lg"></div>
    <div class="flex gap-2 mt-4">
      <button onclick="hantar('MASUK')" class="w-full bg-green-600 text-white p-3 rounded font-bold">MASUK</button>
      <button onclick="hantar('KELUAR')" class="w-full bg-red-600 text-white p-3 rounded font-bold">KELUAR</button>
    </div>
    <div id="status-log" class="mt-4 p-2 text-center font-bold text-sm"></div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
  <script>
    const urlAPI = "https://script.google.com/macros/s/AKfycbyrQcJoGPBKe3nqB-jZlzLM-Wgt_7FurRBnwrE61tQvgIeBelLE2d_nMOPC0qmNRRjrCw/exec";
    let arah = "MASUK";

    const qr = new Html5Qrcode("reader");
    qr.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (id) => hantar(arah, id));

    function hantar(a, id) {
      if(!id) id = prompt("Masukkan ID Pelajar:");
      if(!id) return;

      const log = document.getElementById("status-log");
      log.innerText = "Menghubungi Server...";
      
      fetch(urlAPI, { 
        method: "POST", 
        body: new URLSearchParams({idPelajar: id, arahPergerakan: a}) 
      })
      .then(r => r.json())
      .then(d => {
        log.innerText = d.status === "SUCCESS" ? "Berjaya: " + d.nama : "Ralat: ID Tidak Dijumpai";
        log.className = d.status === "SUCCESS" ? "mt-4 p-2 text-center bg-green-200" : "mt-4 p-2 text-center bg-red-200";
      })
      .catch(() => {
        log.innerText = "Ralat Hubungan! Sila Cuba Lagi.";
        log.className = "mt-4 p-2 text-center bg-yellow-200";
      });
    }
  </script>
</body>
</html>
