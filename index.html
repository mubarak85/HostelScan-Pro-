<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelScan Pro v4.3</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-slate-100 p-4">
  <div class="max-w-4xl mx-auto space-y-6">
    <h1 class="text-2xl font-black text-center text-slate-800">HOSTELSCAN PRO v4.3</h1>
    
    <!-- Kamera -->
    <div id="reader" class="w-full bg-black rounded-lg overflow-hidden"></div>
    
    <!-- Statistik -->
    <div class="grid grid-cols-3 gap-2 text-center">
      <div class="bg-blue-600 text-white p-3 rounded">Total: <span id="stat-total">0</span></div>
      <div class="bg-green-600 text-white p-3 rounded">Masuk: <span id="stat-masuk">0</span></div>
      <div class="bg-red-600 text-white p-3 rounded">Keluar: <span id="stat-keluar">0</span></div>
    </div>

    <!-- Senarai X Masuk -->
    <div class="bg-white p-4 rounded shadow">
      <h2 class="font-bold mb-2 uppercase">🚨 Belum Masuk Asrama</h2>
      <table class="w-full text-sm">
        <tbody id="jadual-tidak-hadir"></tbody>
      </table>
    </div>
  </div>

  <script>
    const urlAPI = "https://script.google.com/macros/s/AKfycbwmBk57WeuuBFQ3gkJXdGeK61bytdS3bHD3NXzQn6Md_IIBFyzfP1C09ffZeAN_iuCgjA/exec";
    
    // Inisialisasi Kamera
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, (text) => {
      prosesData(text);
    });

    function prosesData(id) {
      fetch(urlAPI, { method: "POST", body: new URLSearchParams({idPelajar: id, arahPergerakan: "MASUK"}) })
      .then(r => r.json()).then(d => {
        alert("Status: " + d.status);
        muatData();
      });
    }

    function muatData() {
      fetch(urlAPI).then(r => r.json()).then(d => {
        document.getElementById("stat-total").innerText = d.keseluruhan.total;
        document.getElementById("stat-masuk").innerText = d.keseluruhan.masuk;
        document.getElementById("stat-keluar").innerText = d.keseluruhan.keluar;
        
        let html = "";
        d.senaraiXMasuk.forEach(p => {
          html += `<tr><td class="border-b py-2">${p.nama}</td><td class="border-b text-right">${p.dorm}</td></tr>`;
        });
        document.getElementById("jadual-tidak-hadir").innerHTML = html;
      });
    }

    window.onload = muatData;
  </script>
</body>
</html>
