<!DOCTYPE html>
<html lang="ms">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HostelScan Pro V4.4</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>
</head>
<body class="bg-slate-50 min-h-screen p-2">
  <div class="max-w-md mx-auto bg-white shadow-xl rounded-2xl overflow-hidden p-5">
    <h1 class="text-xl font-bold text-slate-800 text-center mb-4">HOSTELSCAN PRO V4.4</h1>
    
    <div id="reader" class="w-full h-64 bg-slate-900 rounded-lg mb-4"></div>

    <div class="grid grid-cols-3 gap-2 text-center mb-6">
      <div class="p-2 bg-slate-100 rounded">Total<div id="stat-total" class="font-bold">0</div></div>
      <div class="p-2 bg-green-100 rounded">Masuk<div id="stat-masuk" class="font-bold text-green-700">0</div></div>
      <div class="p-2 bg-red-100 rounded">Keluar<div id="stat-keluar" class="font-bold text-red-700">0</div></div>
    </div>

    <div class="overflow-y-auto h-64 border rounded p-2">
      <h2 class="text-sm font-bold text-gray-500 mb-2">PELAJAR BELUM MASUK</h2>
      <table class="w-full text-left text-sm" id="tabel-pelajar"></table>
    </div>

    <button onclick="window.location.reload()" class="w-full mt-4 bg-slate-800 text-white py-2 rounded-lg">Refresh Data</button>
  </div>

  <script>
    const urlAPI = "https://script.google.com/macros/s/AKfycbxzXSBmawbzPIrnwBQeXItCqb-qS9jqKXuHUFAx0f3rylDxMxHJ9r5SzEumFjnriJobRw/exec";
    
    // Inisialisasi Kamera
    const html5QrCode = new Html5Qrcode("reader");
    html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: 200 }, (id) => {
      fetch(urlAPI, { method: "POST", body: new URLSearchParams({idPelajar: id}) })
      .then(() => { alert("Berjaya Imbas!"); muatData(); });
    });

    function muatData() {
      fetch(urlAPI + "?action=getStat").then(r => r.json()).then(d => {
        document.getElementById("stat-total").innerText = d.total;
        document.getElementById("stat-masuk").innerText = d.masuk;
        document.getElementById("stat-keluar").innerText = d.keluar;
        let html = d.senarai.map(p => `<tr><td class="p-1">${p.nama}</td><td class="p-1 text-right font-mono">${p.dorm}</td></tr>`).join('');
        document.getElementById("tabel-pelajar").innerHTML = html;
      });
    }
    muatData();
  </script>
</body>
</html>
